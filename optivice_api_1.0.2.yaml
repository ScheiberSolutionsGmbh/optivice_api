openapi: 3.0.1
info:
  title: OPTIVICE.energy API
  description: |
    ## Overview
    Obtain OAuth2 bearer token using client credentials.
    Push energy and master data.
    Retrieve forecast, kpi and smartmeter data.

    ## Servers
    Use the server dropdown to select the appropriate environment:

    - 🔐 **Authentication Server**  
      Use only for: `/openid-connect/token`

    - 🌐 **Main API Server 1.0.2**  
      Use for all other endpoints (`/masterData/update`, `/energy/data`, `/forecast`, `/kpi`, `/smart-meter-data`)

    Mapping for OBIS codes -> https://energiegemeinschaften.gv.at/obis-code-anpassung-zum-08-04-2024/

    ---
  contact:
    email: mathias.fuchs@scheiber.solutions
    x-additional_email:
      - office@scheiber.solutions
  version: 1.0.2
  x-changelog:
    - version: "1.0.2"
      changes:
        - "Added Smart Meter Data for Billing"
        - "Smart Meter Generation"
        - "Smart Meter Consumption"
    - version: "1.0.1"
      changes:
        - "Added KPI Endpoint"
    - version: "1.0.0"
      changes:
        - "Made the API"

servers:
  - url: https://login.optivice.energy/realms/app.optivice.energy/protocol
    description: Authentication Server
  - url: https://app.optivice.energy/api/1.0.2/
    description: Main API

tags:
  - name: Authentication
    description: Endpoint for OAuth Token
  - name: Master Data
    description: Endpoint for Pushing Master Data -> User Data
  - name: Energy Data
    description: Endpoint for Pushing Energy Data -> timeseries
  - name: Forecast
    description: Endpoint for Requesting Forecast Data
  - name: KPI
    description: KPI Endpoint for Energy in Community
  - name: Smartmeter
    description: Unified endpoint for both generation and consumption smart meter data
  - name: Community Activations
    description: Endpoint for retrieving metering point activation history within an energy community

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://login.optivice.energy/realms/app.optivice.energy/protocol/openid-connect/token
          scopes:
            master_data: Sends Metadata about the User
            energy_data: Sends Timeseries data
            forecast_auth: Retrieves Forecast Timeseries data
            kpi_auth: Retrieves KPI´s
            meter_data: Get Smartmeter Data for Consumption/Generation

  schemas:
    EnergyData:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/energy_data"

    energy_data:
      type: object
      properties:
        energyRecord:
          $ref: "#/components/schemas/energyRecord"

    energyRecord:
      type: object
      properties:
        ecid:
          type: string
          description: Technical identification for community
          example: "AT000000RC1234560000000000000000"
        energyData:
          type: array
          description: Energy data readings
          items:
            $ref: "#/components/schemas/energyData"
        meteringIntervall:
          type: string
          description: Measurement interval (QH = Quarter Hour)
          example: "QH"
        meteringPeriodStart:
          type: string
          format: date-time
          description: Start of metering period (usually 00:00)
          example: "2025-01-28T00:00:00+01:00"
        meteringPeriodEnd:
          type: string
          format: date-time
          description: End of metering period (usually 00:00)
          example: "2025-01-29T00:00:00+01:00"
        processDate:
          type: string
          format: date-time
          description: Datetime when the energy record was generated
          example: "2025-01-29T01:00:00+01:00"
        meteringPoint:
          type: string
          description: Metering point for identification
          example: "AT0010000000000000000000000000000"

    energyData:
      type: object
      description: Energy readings for a specific meter code, containing all time intervals
      properties:
        EP:
          type: array
          description: List of measurement intervals
          items:
            $ref: "#/components/schemas/MeasurementInterval"
        UOM:
          type: string
          description: Unit of measurement (e.g., kWh)
          example: "kWh"
        MeterCode:
          type: string
          description: OBIS meter code identifying the type of measurement (e.g., https://www.ebutilities.at/documents/20200304112759_MeterCodes_ConsumptionRecord.pdf)
          example: "1-1:2.9.0 G.01"

    MeasurementInterval:
      type: object
      description: Single measurement interval (e.g., 15-minute period) with energy value and quality
      properties:
        BQ:
          type: number
          description: Billing Quantity. Measurement Value for billing in a community
          example: 132
        MM:
          type: string
          description: Measurement Quality (L1 = best, L2 = ok, L3 = worst)
          example: "L1"
        DTF:
          type: string
          format: date-time
          description: Start time of measurement
          example: "2025-01-28T00:00:00+01:00"
        DTT:
          type: string
          format: date-time
          description: End time of measurement
          example: "2025-01-28T00:15:00+01:00"

    MasterData:
      type: object
      properties:
        community:
          $ref: "#/components/schemas/community"

    community:
      type: object
      properties:
        ecid:
          type: string
          description: Technical identification for community
          example: "AT000000RC1234560000000000000000"
        communityName:
          type: string
          description: Name of the Community
          example: "EEG am Wald"
        communityType:
          type: string
          description: Type of the Communtiy -> EEG, BEG, GEA
          example: "EEG"
        users:
          type: array
          items:
            $ref: "#/components/schemas/users"

    users:
      type: object
      properties:
        firstName:
          type: string
          example: "Max"
        lastName:
          type: string
          example: "Mustermann"
        email:
          type: string
          example: "max.mustermann@email.com"
        objects:
          type: array
          description: A Single Object -> House. Array of Objects -> House1, House2..
          items:
            $ref: "#/components/schemas/objects"

    objects:
      type: object
      properties:
        objectName:
          type: string
          description: Name of the Object/House for Identification
          example: "House 1"
        zip:
          type: string
          description: Postal Code
          example: "1010"
        city:
          type: string
          description: Name of the City
          example: "Wien"
        address:
          type: string
          description: Street Name and Number
          example: "Heldenplatz 1"
        meteringPoints:
          type: array
          description: A Single Metering Point or an Array of Metering Points
          items:
            $ref: "#/components/schemas/meteringPoints"

    meteringPoints:
      type: object
      properties:
        meteringPoint:
          type: string
          description: Metering Point Number Begining with AT00... has 33 characters
          example: "AT0010000000000000000000000000000"
        meteringPointName:
          type: string
          description: Name of the Metering Point for clearer identification
          example: "Wohnung"
        energyDirection:
          type: string
          description: Energy Direction -> GENERATION or CONSUMPTION
          example: "GENERATION"
        plantCategory:
          type: string
          description: Name of Energy Production. PV, Water, Wind
          example: "PV"
        activations:
          type: array
          description: How much activations and/or deactivations where in this community. 1 or more
          items:
            $ref: "#/components/schemas/activations"

    activations:
      type: object
      properties:
        dateFrom:
          type: string
          description: First Day of the activation in the community. Only Date
          example: "2022-01-01"
        dateTo:
          type: string
          description: End of activation in this community. Or open End.
          example: "9999-12-31"
        partFactor:
          type: string
          description: Participation Factor in this community. 0-100%
          example: "80"

    Forecast:
      type: object
      properties:
        data:
          oneOf:
            - $ref: "#/components/schemas/forecastData"
            - $ref: "#/components/schemas/forecastEcidData"

    forecastData:
      type: object
      properties:
        processingDate:
          type: string
          description: Date the Request was Generated
          example: "2025-02-25 15:50:12.485673"
        meteringPoint:
          type: string
          description: Metering Point for whom the forecast was generated.
          example: "AT0010000000000000000000000000000"
        energyDirection:
          type: string
          description: Energy Direction #todo better name -> which result is needed from the 3 tables?
          example: "GENERATION"
        measurementUnit:
          type: string
          description: Unit in which the forecast is generated
          example: "Wh"
        forecastInterval:
          type: string
          description: Interval (QH = Quarter Hour, H = Hourly)
          example: "QH"
        forecast:
          type: array
          description: Main forecast data
          items:
            $ref: "#/components/schemas/forecastItem"

    forecastEcidData:
      type: object
      properties:
        processingDate:
          type: string
          description: Date the Request was Generated
          example: "2025-02-25 15:50:12.485673"
        ecid:
          type: string
          description: ECID of the energy community for which the forecast was generated
          example: "AT000000RC1234560000000000000000"
        measurementUnit:
          type: string
          description: Unit in which the forecast is generated
          example: "Wh"
        forecastInterval:
          type: string
          description: Interval (QH = Quarter Hour, H = Hourly)
          example: "H"
        generationForecast:
          type: array
          description: Generation forecast data for the energy community
          items:
            $ref: "#/components/schemas/forecastItem"
        consumptionForecast:
          type: array
          description: Consumption forecast data for the energy community
          items:
            $ref: "#/components/schemas/forecastItem"

    forecastItem:
      type: object
      properties:
        forecastDate:
          type: string
          description: Datetime that the forecast generates in UTC. One week in the future.
          example: "2025-03-04 12:30:00+00:00"
        forecastValue:
          type: string
          description: Value of the forecast
          example: "17872.35"
        dateModified:
          type: string
          description: Datetime when the forecast was generated.
          example: "2025-02-25 14:08:15+00:00"

    kpi:
      type: object
      description: "Alle Energiewerte sind in Wh"
      properties:
        # ecid:
        #   type: string
        #   description: ECID
        #   example: "AT00100000000RC123456000000000000"
        # dateFrom:
        #   type: string
        #   example: "2025-01-01"
        # dateTo:
        #   type: string
        #   example: "2025-01-07"
        # unit:
        #   type: string
        #   example: "Wh"
        gesamtbezug:
          type: integer
          example: 23000
          description: ""
        eg_bezug:
          type: integer
          example: 12000
          description: ""
        gesamteinspeisung:
          type: integer
          example: 15000
          description: ""
        netzeinspeisung:
          type: integer
          example: 5000
          description: ""
        erzeugung:
          type: integer
          example: 25000
          description: ""
        verbrauch:
          type: integer
          example: 40000
          description: ""
        eigenverbrauch:
          type: integer
          example: 10000
          description: ""
        eg_einspeisung:
          type: integer
          example: 10000
          description: ""
        netzbezug:
          type: integer
          example: 11000
          description: ""
        ueberschuss:
          type: integer
          example: 15000
          description: ""
        bedarf:
          type: integer
          example: 40000
          description: ""
        nutzungsgrad:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.67
          description: "nutzungsgrad in der Energiegemeinschaft als float zwischen 0 und 1"
        autarkiegrad:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.55
          description: "Autarkiegrad der Energiegemeinschaft als float zwischen 0 und 1"

    SmartMeterGenerationData:
      type: object
      required: [ecid, meteringPoint, dateFrom, dateTo]
      properties:
        processingDate:
          type: string
          format: date-time
          example: 2025-01-01T23:00:00+00:00
        ecid:
          type: string
          example: "AT000000RC1234560000000000000000"
        meteringPoint:
          type: string
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        energyDirection:
          type: string
          example: "GENERATION"
        measurementUnit:
          type: string
          example: "kWh"
        measurementIntervall:
          type: string
          example: "QH"
        measurements:
          type: array
          items:
            type: object
            properties:
              1-1:2.9.0 G.01:
                type: array
                items:
                  type: object
                  properties:
                    measuringStart:
                      type: string
                      format: date-time
                      example: 2025-01-01T23:00:00+00:00
                    value:
                      type: number
                    dataQuality:
                      type: string
                      enum: [L1, L2, L3]
                      example: "L1"
              1-1:2.9.0 P.01T:
                type: array
                items:
                  type: object
                  properties:
                    measuringStart:
                      type: string
                      format: date-time
                      example: 2025-01-01T23:00:00+00:00
                    value:
                      type: number
                    dataQuality:
                      type: string
                      enum: [L1, L2, L3]
                      example: "L1"
              1-1:2.9.0 G.01T:
                type: array
                items:
                  type: object
                  properties:
                    measuringStart:
                      type: string
                      format: date-time
                      example: 2025-01-01T23:00:00+00:00
                    value:
                      type: number
                    dataQuality:
                      type: string
                      enum: [L1, L2, L3]
                      example: "L1"

    SmartMeterActivationsResponse:
      type: object
      description: Response containing all metering point activations (current and historical) for an energy community
      properties:
        ProcessingDate:
          type: string
          format: date-time
          description: Datetime when the response was generated (UTC)
          example: "2026-07-20T14:49:36.980090+00:00"
        ECID:
          type: string
          description: Technical identification for the energy community
          example: "AT000000RC1234560000000000000000"
        ECType:
          type: string
          description: Type of the energy community (GC, RC_L, RC_R, CC)
          example: "RC_L"
        ECDisModel:
          type: string
          description: Distribution model of the energy community
          example: "D"
        MPListData:
          type: array
          description: List of metering points with their activation periods
          items:
            $ref: "#/components/schemas/MPListEntry"

    MPListEntry:
      type: object
      description: A single metering point with all its activation periods
      properties:
        MeteringPoint:
          type: string
          description: Metering point identifier (AT00... 33 characters)
          example: "AT0010000000000000000000000000000"
        MPTimeData:
          type: array
          description: Chronological list of activation periods for this metering point
          items:
            $ref: "#/components/schemas/MPTimeEntry"

    MPTimeEntry:
      type: object
      description: A single activation period for a metering point within the community
      required: [DateFrom, DateTo, EnergyDirection, ECPartFact, DateActivate]
      properties:
        DateFrom:
          type: string
          format: date
          description: Start date of the activation period
          example: "2023-07-05"
        DateTo:
          type: string
          format: date
          description: End date of the activation period. "9999-12-31" indicates open-ended
          example: "9999-12-31"
        EnergyDirection:
          type: string
          description: Energy direction for this metering point
          enum: [GENERATION, CONSUMPTION]
          example: "CONSUMPTION"
        ECPartFact:
          type: string
          description: Participation factor in the community (1-100%)
          example: "100"
        DateActivate:
          type: string
          format: date
          description: Date when the metering point was first activated in the community
          example: "2023-07-05"
        DateDeactivate:
          type: string
          format: date
          description: Date when the metering point was deactivated (only present if deactivated)
          example: "2024-12-31"
        ECShare:
          type: string
          description: Energy community share as a decimal string
          example: "0.0000"

    SmartMeterConsumptionData:
      type: object
      required: [ecid, meteringPoint, dateFrom, dateTo]
      properties:
        processingDate:
          type: string
          format: date-time
          example: 2025-01-01T23:00:00+00:00
        ecid:
          type: string
        meteringPoint:
          type: string
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        energyDirection:
          type: string
          example: "CONSUMPTION"
        measurementUnit:
          type: string
          example: "kWh"
        measurementIntervall:
          type: string
          example: "QH"
        measurements:
          type: array
          items:
            type: object
            properties:
              1-1:1.9.0 G.01:
                type: array
                items:
                  type: object
                  properties:
                    measuringStart:
                      type: string
                      format: date-time
                      example: 2025-01-01T23:00:00+00:00
                    value:
                      type: number
                    dataQuality:
                      type: string
                      enum: [L1, L2, L3]
                      example: "L1"
              1-1:2.9.0 G.02:
                type: array
                items:
                  type: object
                  properties:
                    measuringStart:
                      type: string
                      format: date-time
                      example: 2025-01-01T23:00:00+00:00
                    value:
                      type: number
                    dataQuality:
                      type: string
                      enum: [L1, L2, L3]
                      example: "L1"
              1-1:2.9.0 G.03:
                type: array
                items:
                  type: object
                  properties:
                    measuringStart:
                      type: string
                      format: date-time
                      example: 2025-01-01T23:00:00+00:00
                    value:
                      type: number
                    dataQuality:
                      type: string
                      enum: [L1, L2, L3]
                      example: "L1"
              1-1:1.9.0 G.01T:
                type: array
                items:
                  type: object
                  properties:
                    measuringStart:
                      type: string
                      format: date-time
                      example: 2025-01-01T23:00:00+00:00
                    value:
                      type: number
                    dataQuality:
                      type: string
                      enum: [L1, L2, L3]
                      example: "L1"
              1-1:2.9.0 G.03R:
                type: array
                items:
                  type: object
                  properties:
                    measuringStart:
                      type: string
                      format: date-time
                      example: 2025-01-01T23:00:00+00:00
                    value:
                      type: number
                    dataQuality:
                      type: string
                      enum: [L1, L2, L3]
                      example: "L1"

paths:
  /openid-connect/token:
    servers:
      - url: https://login.optivice.energy/realms/app.optivice.energy/protocol
    post:
      tags:
        - Authentication
      summary: Get OAuth Bearer Token
      description: Obtain an access token using the client credentials flow.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  example: "client_credentials"
                client_id:
                  type: string
                  example: "your-client-id"
                client_secret:
                  type: string
                  example: "your-client-secret"
                scope:
                  type: string
                  example: "master_data"
            examples:
              master_data:
                summary: This is for master_data -> User data, objects, meteringpoints, etc...
                value:
                  grant_type: "client_credentials"
                  client_id: "your-client-id"
                  client_secret: "your-client-secret"
                  scope: "master_data"
              energy_data:
                summary: This is for energy_data -> timeseries
                value:
                  grant_type: "client_credentials"
                  client_id: "your-client-id"
                  client_secret: "your-client-secret"
                  scope: "energy_data"
      parameters:
        - in: header
          name: Content-Type
          schema:
            type: string
            example: "application/x-www-form-urlencoded"
          required: true
      responses:
        "200":
          description: Successful token response
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: "eyJhbGciOiJIUzI1..."
                  token_type:
                    type: string
                    example: "Bearer"
                  expires_in:
                    type: integer
                    example: 300
        "400":
          description: Invalid request (e.g., missing credentials)
        "401":
          description: Unauthorized (invalid credentials)

  /masterData/update:
    servers:
      - url: https://app.optivice.energy/api/1.0.0/
    post:
      tags:
        - Master Data
      summary: Insert Master Data
      requestBody:
        description: ""
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MasterData"
        required: true
      security:
        - OAuth2:
            - master_data
      responses:
        "200":
          description: Success
        "400":
          description: Invalid Request Format

  /energy/data:
    servers:
      - url: https://app.optivice.energy/api/1.0.0/
    post:
      tags:
        - Energy Data
      summary: Insert Energy Data -> timeseries
      requestBody:
        description: ""
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnergyData"
      security:
        - OAuth2:
            - energy_data
      responses:
        "200":
          description: Success
  /forecast:
    servers:
      - url: https://app.optivice.energy/api/1.0.0/
    get:
      tags:
        - Forecast
      summary: Retrieve forecast data
      description: |
        Returns forecast data based on query parameters. Either meteringPoint or ecid must be provided.
        
        - When requesting by **meteringPoint**: Returns forecast data for a specific metering point
        - When requesting by **ecid**: Returns both generation and consumption forecast data for the entire energy community
      parameters:
        - name: meteringPoint
          in: query
          required: false
          description: "Metering point ID to filter the forecast data."
          schema:
            type: string
            example: "AT0010000000000000000000000000123"
        - name: ecid
          in: query
          required: false
          description: "ECID of the community of which the forecast is requested."
          schema:
            type: string
            example: "AT00100000000RC123456000000000123"
        - name: dateFrom
          in: query
          required: true
          description: "Start date of the forecast range (YYYY-MM-DD, YYYY-MM-DDTHH:MM:SS, or ISO 8601 with timezone)"
          schema:
            type: string
            format: date
            example: "2025-02-25"
        - name: dateTo
          in: query
          required: true
          description: "End date of the forecast range (YYYY-MM-DD, YYYY-MM-DDTHH:MM:SS, or ISO 8601 with timezone)."
          schema:
            type: string
            format: date
            example: "2025-03-04"
      security:
        - OAuth2:
            - forecast_auth
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Forecast"
              examples:
                meteringPointResponse:
                  summary: Response when requesting by meteringPoint
                  value:
                    data:
                      processingDate: "2025-02-25 15:50:12.485673"
                      meteringPoint: "AT0010000000000000000000000000000"
                      energyDirection: "GENERATION"
                      measurementUnit: "Wh"
                      forecastInterval: "QH"
                      forecast:
                        - forecastDate: "2025-03-04 12:30:00+00:00"
                          forecastValue: "17872.35"
                          dateModified: "2025-02-25 14:08:15+00:00"
                ecidResponse:
                  summary: Response when requesting by ecid (energy community)
                  value:
                    data:
                      processingDate: "2025-02-25 15:50:12.485673"
                      ecid: "AT000000RC1234560000000000000000"
                      measurementUnit: "Wh"
                      forecastInterval: "H"
                      generationForecast:
                        - forecastDate: "2025-03-04 12:30:00+00:00"
                          forecastValue: "17872.35"
                          dateModified: "2025-02-25 14:08:15+00:00"
                      consumptionForecast:
                        - forecastDate: "2025-03-04 12:30:00+00:00"
                          forecastValue: "25123.45"
                          dateModified: "2025-02-25 14:08:15+00:00"
        "400":
          description: Bad Request (Invalid parameters)
        "500":
          description: Internal Server Error

  /kpi:
    servers:
      - url: https://app.optivice.energy/api/1.0.2/
    get:
      tags:
        - KPI
      summary: Retrieve Kpi Data
      description: Returns a variety of KPIs based on query parameters. Unit is Wh.
      parameters:
        - name: ecid
          in: query
          required: true
          description: "ECID to filter the Community and KPI data"
          schema:
            type: string
        - name: dateFrom
          in: query
          required: true
          description: "Start date of the KPI range (YYYY-MM-DD, YYYY-MM-DDTHH:MM:SS, or ISO 8601 with timezone)"
          schema:
            type: string
            format: date
            example: "2025-01-01"
        - name: dateTo
          in: query
          required: true
          description: "End date of the KPI range (YYYY-MM-DD, YYYY-MM-DDTHH:MM:SS, or ISO 8601 with timezone)"
          schema:
            type: string
            format: date
            example: "2025-01-07"
      security:
        - OAuth2:
            - kpi_auth
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/kpi"
        "400":
          description: Bad Request (Invalid Parameters)

  /smartmeter-activations:
    servers:
      - url: https://app.optivice.energy/api/1.0.2/
    get:
      tags:
        - Community Activations
      summary: Get all smart meter activations for a community
      description: |
        Retrieve all metering point activations (current and historical) for a given energy community.
        Returns top-level community metadata (ECID, ECType, ECDisModel) and a list of all metering points
        with their chronological activation periods, including participation factor, energy direction,
        and optional deactivation date and community share.

        Note that the response is built from data provided by grid operators and can therefore contain inconsistencies or outdated information.
      parameters:
        - name: ecid
          in: query
          required: true
          description: "ECID of the energy community for which activations are requested"
          schema:
            type: string
            example: "AT000000RC1234560000000000000000"
      security:
        - OAuth2:
            - meter_data
      responses:
        "200":
          description: Successfully retrieved smart meter activations for the community
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmartMeterActivationsResponse"
              examples:
                communityActivations:
                  summary: Community with generation and consumption metering points
                  value:
                    ProcessingDate: "2026-07-20T14:49:36.980090+00:00"
                    ECID: "AT000000RC1234560000000000000000"
                    ECType: "RC_L"
                    ECDisModel: "D"
                    MPListData:
                      - MeteringPoint: "AT0010000000000000000000000000001"
                        MPTimeData:
                          - DateFrom: "2023-07-05"
                            DateTo: "9999-12-31"
                            EnergyDirection: "GENERATION"
                            ECPartFact: "100"
                            DateActivate: "2023-07-05"
                            ECShare: "0.0000"
                      - MeteringPoint: "AT0010000000000000000000000000002"
                        MPTimeData:
                          - DateFrom: "2023-07-05"
                            DateTo: "2024-07-16"
                            EnergyDirection: "CONSUMPTION"
                            ECPartFact: "100"
                            DateActivate: "2023-07-05"
                            ECShare: "0.0000"
                          - DateFrom: "2024-07-17"
                            DateTo: "9999-12-31"
                            EnergyDirection: "CONSUMPTION"
                            ECPartFact: "90"
                            DateActivate: "2023-07-05"
                            ECShare: "0.0000"
        "400":
          description: Bad Request (Invalid Parameters)
        "404":
          description: Not Found (Community not found or no permission)
        "500":
          description: Internal Server Error

  /smartmeter-data:
    servers:
      - url: https://app.optivice.energy/api/1.0.2/
    get:
      tags:
        - Smartmeter
      summary: Get smart meter data (auto-detect generation or consumption)
      description: |
        Unified endpoint to retrieve smart meter data. The API will determine whether the data is for generation or consumption based on the metering point context.
      parameters:
        - name: ecid
          in: query
          required: true
          schema:
            type: string
            example: "AT000000RC1234560000000000000000"
        - name: meteringPoint
          in: query
          required: true
          schema:
            type: string
            example: "AT0010000000000000000000000000000"
        - name: dateFrom
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2025-01-01"
        - name: dateTo
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2025-01-31"
      security:
        - OAuth2:
            - meter_data
      responses:
        "200":
          description: Smart meter data for generation or consumption
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/SmartMeterGenerationData"
                      - $ref: "#/components/schemas/SmartMeterConsumptionData"
        "400":
          description: Bad Request (Invalid Parameters)
        "500":
          description: Internal Server Error
